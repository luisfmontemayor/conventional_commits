customCommands:
  - key: "W"
    context: "global"
    description: "Conventional Commit Wizard"
    command: 'git commit -m {{index .PromptResponses 2 | quote}}'
    prompts:
      - type: "menu"
        title: "Select Commit Type"
        options:
          - value: "feat"
            description: "A new feature"
          - value: "fix"
            description: "A bug fix"
          - value: "refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
          - value: "chore"
            description: "Other: either a refactor, a fix or a feat"
          - value: "test"
            description: "Adding tests or correcting existing ones"
          - value: "docs"
            description: "Documenting the product"

      - type: "menuFromCommand"
        title: "Select Scope"
        command: 'python3 "$(git rev-parse --git-dir)/get_staged_scopes.py"'
        filter: '(?P<value>.*)'
        valueFormat: '{{ .value }}'
        labelFormat: '{{ .value }}'

      - type: "input"
        title: "Commit Message"
        initialValue: "{{index .PromptResponses 0}}{{index .PromptResponses 1}}: "
